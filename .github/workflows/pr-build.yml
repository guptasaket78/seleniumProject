name: PR Build Check

on:
  pull_request:
    branches: [ "main" ]

jobs:
  compile-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Compile and run tests
        run: mvn -B clean test -Dheadless=true
